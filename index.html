<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать Music.zip с имитацией загрузки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        /* Стиль кнопки */
        .download-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            background-color: #007bff;
            border-radius: 5px;
            cursor: pointer; /* Делаем курсор кликабельным */
            transition: background-color 0.3s;
        }
        .download-button:hover {
            background-color: #0056b3;
        }

        /* Стиль для крутящегося спиннера */
        .spinner {
            border: 8px solid #f3f3f3; /* Светло-серый круг */
            border-top: 8px solid #007bff; /* Синяя полоса */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite; /* Анимация вращения */
            margin: 20px auto;
            display: none; /* Изначально скрыт */
        }
        /* Анимация вращения */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="status-text">Нажмите, чтобы скачать music.zip!</h1>
        
        <div id="button-area">
            <button id="start-download" class="download-button">
                ⬇️ Скачать music.zip
            </button>
        </div>
        
        <div id="loading-spinner" class="spinner"></div>

        <a id="download-link" href="music.zip" download style="display: none;"></a>
    </div>

    <script>
        const downloadButton = document.getElementById('start-download');
        const spinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');
        const downloadLink = document.getElementById('download-link');
        const buttonArea = document.getElementById('button-area');
        
        // Время имитации загрузки в миллисекундах (3 секунды)
        const loadingTime = 3000; 

        downloadButton.addEventListener('click', function() {
            // 1. Скрываем кнопку
            buttonArea.style.display = 'none'; 
            
            // 2. Показываем спиннер
            spinner.style.display = 'block'; 
            
            // 3. Меняем текст
            statusText.textContent = 'Подключение к серверу...';
            
            // 4. Запускаем таймер
            setTimeout(() => {
                // Через 3 секунды:
                
                // 4a. Меняем текст
                statusText.textContent = 'Загрузка готова!';

                // 4b. Скрываем спиннер
                spinner.style.display = 'none';

                // 4c. Запускаем скачивание, кликая по скрытой ссылке
                downloadLink.click();

            }, loadingTime);
        });
    </script>
</body>
</html>
