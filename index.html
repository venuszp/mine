<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Drive | Tish Anatomiyasi</title>
    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff0055;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        ::-webkit-scrollbar { width: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: white; overflow: hidden;
        }

        /* ЛОАДЕР */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .counter { font-size: clamp(4rem, 15vw, 8rem); font-weight: 900; color: var(--neon); text-shadow: 0 0 30px var(--neon); font-style: italic; }

        /* ТУЛБАР */
        .toolbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border-glass);
            z-index: 1000; box-sizing: border-box;
        }
        #title { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        
        .nav-buttons { display: flex; gap: 10px; }

        .btn-neon {
            border: 1px solid var(--neon); color: var(--neon); text-decoration: none;
            padding: 8px 15px; border-radius: 4px; font-size: 10px; font-weight: bold;
            transition: 0.2s; background: transparent; text-transform: uppercase; cursor: pointer;
        }
        .btn-neon:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        .btn-pptx { border-color: #ff9d00; color: #ff9d00; }
        .btn-pptx:hover { background: #ff9d00; color: black; box-shadow: 0 0 20px #ff9d00; }

        /* КОНТЕНТ */
        .viewer-container {
            position: absolute; top: 60px; left: 0; right: 0; bottom: 0;
            opacity: 0; transition: 0.8s ease;
        }
        .viewer-container.active { opacity: 1; }
        iframe { width: 100%; height: 100%; border: none; background: #1a1a1a; }

        /* АЛЕРТ */
        #alert-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(10, 10, 10, 0.98); border: 1px solid var(--pink);
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.4); z-index: 10001;
            display: none; opacity: 0; transition: 0.4s; width: 85%; max-width: 320px;
        }
        #alert-box.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="counter" id="percent">0</div>
    </div>

    <div class="toolbar" id="main-toolbar">
        <div id="title">Tishning anatomik tuzilishi</div>
        <div class="nav-buttons">
            <a href="1.pdf" download class="btn-neon">PDF</a>
            <a href="1.pptx" download class="btn-neon btn-pptx">PPTX</a>
        </div>
    </div>

    <div id="alert-box">
        <h3 style="color: var(--pink); margin-top: 0;">ВНИМАНИЕ!</h3>
        <p>Александра в 10 метрах от вас</p>
        <button class="btn-neon" style="border-color: var(--pink); color: var(--pink); width: 100%;" onclick="closeAlert()">ОК</button>
    </div>

    <main class="viewer-container" id="content">
        <iframe src="1.pdf#toolbar=0" id="pdf-frame"></iframe>
    </main>

    <script>
        const percentEl = document.getElementById('percent');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        const alertBox = document.getElementById('alert-box');
        
        let val = 0;
        const fastLoad = setInterval(() => {
            val += Math.floor(Math.random() * 25) + 15;
            if (val >= 100) {
                val = 100;
                clearInterval(fastLoad);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        content.classList.add('active');
                        setTimeout(() => { alertBox.classList.add('show'); }, 10000);
                    }, 500);
                }, 100);
            }
            percentEl.innerText = val;
        }, 40);

        function closeAlert() { alertBox.style.opacity = '0'; setTimeout(() => { alertBox.style.display = 'none'; }, 400); }

        function activateEasterEgg() {
            const title = document.getElementById('title');
            title.innerText = 'said.pedofil';
            title.style.color = 'var(--pink)';
            document.getElementById('main-toolbar').style.borderBottom = '1px solid var(--pink)';
        }

        document.addEventListener('keydown', (e) => { if (e.code === 'Space') activateEasterEgg(); });
        document.getElementById('title').addEventListener('click', activateEasterEgg);
    </script>
</body>
</html>
