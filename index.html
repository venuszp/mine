<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The End Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #09111d;
      --bg-mid: #10192b;
      --bg-bottom: #04070d;
      --text: #f5efe6;
      --muted: rgba(245, 239, 230, 0.74);
      --line: rgba(255, 255, 255, 0.08);
      --hero: #eef3fb;
      --enemy: #ffc857;
      --accent: #ff5a36;
      --blood: #9d0f14;
      --blood-dark: #5c070b;
      --card: rgba(8, 12, 22, 0.84);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(88, 160, 255, 0.22), transparent 28%),
        radial-gradient(circle at 78% 22%, rgba(255, 90, 54, 0.18), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.88), transparent 90%);
      pointer-events: none;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .moon {
      position: absolute;
      right: 9%;
      top: 11%;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff4c6 0%, #ffe09a 42%, #eeb764 100%);
      box-shadow: 0 0 72px rgba(255, 218, 128, 0.16);
      opacity: 0.82;
    }

    .skyline {
      position: absolute;
      inset: auto 0 150px;
      height: 220px;
      opacity: 0.12;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 2%, transparent 2% 8%, rgba(255, 255, 255, 0.08) 8% 11%, transparent 11% 17%, rgba(255, 255, 255, 0.08) 17% 22%, transparent 22% 27%, rgba(255, 255, 255, 0.08) 27% 31%, transparent 31% 39%, rgba(255, 255, 255, 0.08) 39% 44%, transparent 44% 49%, rgba(255, 255, 255, 0.08) 49% 53%, transparent 53% 61%, rgba(255, 255, 255, 0.08) 61% 67%, transparent 67% 74%, rgba(255, 255, 255, 0.08) 74% 78%, transparent 78% 86%, rgba(255, 255, 255, 0.08) 86% 91%, transparent 91% 100%);
      mask-image: linear-gradient(180deg, transparent, #000 18%);
    }

    .ground {
      position: absolute;
      inset: auto 0 0;
      height: 180px;
      background: linear-gradient(180deg, #131c30 0%, #090f18 100%);
      border-top: 1px solid var(--line);
    }

    .ground::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 28px, transparent 28px 56px),
        linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.34));
      opacity: 0.55;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 18%, rgba(0, 0, 0, 0.74) 100%);
      pointer-events: none;
    }

    .start-layer,
    .choice-layer,
    .end-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 8;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .start-layer {
      background: rgba(4, 7, 13, 0.84);
    }

    .start-layer.hidden,
    .choice-layer.hidden,
    .end-layer.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-pill {
      padding: 22px 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(10, 14, 25, 0.58);
      backdrop-filter: blur(16px);
      font-family: "Russo One", sans-serif;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: clamp(14px, 2vw, 24px);
      animation: idle-breathe 2s ease-in-out infinite;
    }

    .choice-layer {
      background: rgba(4, 7, 13, 0.36);
    }

    .choice-box {
      width: min(560px, calc(100vw - 32px));
      padding: 24px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      display: grid;
      gap: 18px;
    }

    .choice-box p {
      margin: 0;
      text-align: center;
      font-size: clamp(18px, 2.5vw, 30px);
      line-height: 1.28;
      font-weight: 700;
    }

    .choice-row {
      position: relative;
      min-height: 82px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      overflow: hidden;
    }

    .choice-btn,
    .replay-btn {
      border: 0;
      border-radius: 999px;
      padding: 16px 28px;
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, left 0.45s ease, top 0.45s ease;
    }

    .choice-btn:hover,
    .replay-btn:hover {
      transform: translateY(-2px);
    }

    .choice-btn.safe {
      color: #fff4f4;
      background: linear-gradient(135deg, #5f0b11, #a10d12);
      box-shadow: 0 16px 28px rgba(128, 10, 16, 0.24);
    }

    .choice-btn.doom {
      color: #27160a;
      background: linear-gradient(135deg, #ffd19d, #ffb86b);
      box-shadow: 0 16px 28px rgba(255, 184, 107, 0.22);
      position: relative;
    }

    .choice-btn.doom.escape {
      position: absolute;
    }

    .actors {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .character {
      position: absolute;
      bottom: 94px;
      width: 220px;
      height: 390px;
      transform-origin: bottom center;
    }

    .mumin {
      left: clamp(140px, 20vw, 330px);
      color: var(--hero);
    }

    .mohir {
      right: clamp(140px, 20vw, 330px);
      color: var(--enemy);
    }

    .label {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(7, 12, 24, 0.82);
      border: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .head {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 102px;
      height: 102px;
      transform: translateX(-50%);
      border-radius: 42px 42px 36px 36px;
      background: currentColor;
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.12);
    }

    .head::before,
    .head::after {
      content: "";
      position: absolute;
      top: -10px;
      width: 20px;
      height: 28px;
      border-radius: 14px;
      background: currentColor;
    }

    .head::before {
      left: 10px;
      transform: rotate(-12deg);
    }

    .head::after {
      right: 10px;
      transform: rotate(12deg);
    }

    .face {
      position: absolute;
      inset: 0;
    }

    .face::before,
    .face::after {
      content: "";
      position: absolute;
      top: 34px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #101010;
    }

    .face::before {
      left: 31px;
    }

    .face::after {
      right: 31px;
    }

    .snout {
      position: absolute;
      left: 50%;
      top: 38px;
      width: 34px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
    }

    .x-eyes {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .x-eye {
      position: absolute;
      top: 31px;
      width: 16px;
      height: 16px;
    }

    .x-eye.left {
      left: 25px;
    }

    .x-eye.right {
      right: 25px;
    }

    .x-eye::before,
    .x-eye::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 0;
      width: 3px;
      height: 16px;
      border-radius: 999px;
      background: #151515;
    }

    .x-eye::before {
      transform: rotate(45deg);
    }

    .x-eye::after {
      transform: rotate(-45deg);
    }

    .torso {
      position: absolute;
      top: 108px;
      left: 50%;
      width: 74px;
      height: 142px;
      transform: translateX(-50%);
      border-radius: 38px;
      background: currentColor;
    }

    .arm,
    .leg {
      position: absolute;
      background: currentColor;
      border-radius: 999px;
      transform-origin: top center;
    }

    .arm {
      top: 126px;
      width: 20px;
      height: 122px;
    }

    .arm-left {
      left: 55px;
      transform: rotate(18deg);
    }

    .arm-right {
      right: 55px;
      transform: rotate(-18deg);
    }

    .leg {
      top: 236px;
      width: 22px;
      height: 146px;
    }

    .leg-left {
      left: 82px;
      transform: rotate(5deg);
    }

    .leg-right {
      right: 82px;
      transform: rotate(-5deg);
    }

    .gun {
      position: absolute;
      top: 158px;
      left: 146px;
      width: 70px;
      height: 22px;
      border-radius: 4px 6px 6px 4px;
      background: linear-gradient(180deg, #4b5565, #1f2732);
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.06), 0 3px 8px rgba(0, 0, 0, 0.25);
      transform: rotate(-8deg);
      opacity: 1;
    }

    .gun::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 15px;
      width: 20px;
      height: 22px;
      border-radius: 2px 2px 6px 8px;
      background: linear-gradient(180deg, #2b313c, #111827);
      transform: skew(-12deg);
    }

    .gun::after {
      content: "";
      position: absolute;
      right: -20px;
      top: 6px;
      width: 24px;
      height: 9px;
      border-radius: 0 4px 4px 0;
      background: linear-gradient(180deg, #6b7280, #394150);
    }

    .flash {
      position: absolute;
      left: 212px;
      top: 142px;
      width: 36px;
      height: 36px;
      background: radial-gradient(circle, #fff5c0 0%, #ff8d54 55%, transparent 72%);
      opacity: 0;
      transform: scale(0.3);
    }

    .shot-line {
      position: absolute;
      left: 230px;
      top: 156px;
      width: 0;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #fff5c0, #ff6f4c, transparent);
      opacity: 0;
    }

    .impact {
      position: absolute;
      top: 160px;
      left: 20px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.8);
      opacity: 0;
      transform: scale(0.25);
    }

    .impact-glow {
      position: absolute;
      left: -6px;
      top: 146px;
      width: 90px;
      height: 78px;
      background: radial-gradient(circle, rgba(255, 88, 88, 0.55) 0%, rgba(255, 88, 88, 0.18) 42%, transparent 74%);
      filter: blur(4px);
      opacity: 0;
      transform: scale(0.2);
    }

    .bubble-anchor {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .speech {
      position: absolute;
      max-width: min(270px, 34vw);
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(248, 241, 232, 0.96);
      color: #111827;
      font-weight: 700;
      font-size: clamp(15px, 1.9vw, 24px);
      line-height: 1.16;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
      opacity: 0;
      transform: translateY(16px) scale(0.95);
    }

    .speech::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      background: inherit;
      transform: rotate(45deg);
      bottom: -6px;
      border-radius: 3px;
    }

    .speech.mohir-line {
      left: calc(50% - 140px);
      top: 56px;
    }

    .speech.mohir-line::after {
      left: 26px;
    }

    .speech.mumin-line {
      left: calc(50% - 120px);
      top: 52px;
    }

    .speech.mumin-line::after {
      left: 28px;
    }

    .play .mumin {
      animation:
        shooter-step 2s cubic-bezier(.22, 1, .36, 1) forwards,
        approach-target 2.1s cubic-bezier(.22, 1, .36, 1) 4.1s forwards,
        final-shot-pose 1s cubic-bezier(.22, 1, .36, 1) 6.9s forwards;
    }

    .play .mumin .arm-right {
      animation:
        aim-arm 2s cubic-bezier(.22, 1, .36, 1) forwards,
        lower-arm 1.4s cubic-bezier(.22, 1, .36, 1) 5.1s forwards,
        finish-arm 0.9s cubic-bezier(.22, 1, .36, 1) 6.9s forwards;
    }

    .play .flash {
      animation:
        muzzle-flash 0.42s ease 2.18s forwards,
        muzzle-flash 0.38s ease 7.12s forwards;
    }

    .play .shot-line {
      animation:
        shot-line 0.4s linear 2.14s forwards,
        shot-line-close 0.34s linear 7.08s forwards;
    }

    .play .impact {
      animation: impact-ring 0.7s ease 2.32s forwards;
    }

    .play .impact-glow {
      animation: impact-glow-burst 1s ease 2.34s forwards;
    }

    .play .mohir {
      animation:
        fall-down 1.8s cubic-bezier(.22, 1, .36, 1) 2.4s forwards,
        stillness 1s ease 4.5s forwards,
        final-hit-react 0.65s ease 7.16s forwards;
    }

    .play .mohir .torso {
      animation: mohir-hunch 1s cubic-bezier(.22, 1, .36, 1) 5.2s forwards;
    }

    .play .mohir .head {
      animation: mohir-head-drop 1s cubic-bezier(.22, 1, .36, 1) 5.2s forwards;
    }

    .play .mohir .arm-left,
    .play .mohir .arm-right {
      animation: mohir-arms-drop 1s cubic-bezier(.22, 1, .36, 1) 5.2s forwards;
    }

    .play .mohir-line {
      animation: speech-in 0.85s cubic-bezier(.22, 1, .36, 1) 5.3s forwards;
    }

    .play .mumin-line {
      animation: speech-in 0.8s cubic-bezier(.22, 1, .36, 1) 6.35s forwards;
    }

    .play .x-eyes {
      animation: eyes-on 0.25s ease 7.28s forwards;
    }

    .play .gun {
      animation: gun-drop 1.1s cubic-bezier(.22, 1, .36, 1) 7.58s forwards;
    }

    .end-layer {
      background: rgba(0, 0, 0, 0.96);
    }

    .end-card {
      width: min(920px, calc(100vw - 32px));
      padding: clamp(24px, 5vw, 48px);
      display: grid;
      justify-items: center;
      gap: 28px;
    }

    .end-title {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 0.04em;
      flex-wrap: nowrap;
      white-space: nowrap;
      font-family: "Russo One", sans-serif;
      font-size: clamp(72px, 15vw, 220px);
      line-height: 0.84;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blood);
      text-shadow:
        0 0 28px rgba(140, 12, 16, 0.24),
        0 14px 0 rgba(58, 0, 0, 0.75);
      position: relative;
      animation: end-breathe 3s ease-in-out infinite;
    }

    .end-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(28px) scale(0.92);
      animation: letter-in 0.5s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .end-gap {
      width: 0.38em;
    }

    .end-title::after {
      content: "";
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: -60px;
      height: 96px;
      background:
        linear-gradient(180deg, rgba(122, 8, 13, 0.95) 0 22%, transparent 22%),
        radial-gradient(circle at 6% 8%, var(--blood) 0 11px, transparent 12px),
        radial-gradient(circle at 18% 6%, #8a0a0f 0 13px, transparent 14px),
        radial-gradient(circle at 31% 4%, var(--blood) 0 15px, transparent 16px),
        radial-gradient(circle at 48% 8%, #7d090e 0 14px, transparent 15px),
        radial-gradient(circle at 64% 6%, var(--blood) 0 16px, transparent 17px),
        radial-gradient(circle at 81% 7%, #8a0a0f 0 14px, transparent 15px),
        radial-gradient(circle at 94% 10%, var(--blood) 0 11px, transparent 12px),
        linear-gradient(180deg, transparent 0 30%, var(--blood-dark) 30% 100%);
      clip-path: polygon(0 0, 100% 0, 100% 22%, 96% 22%, 94% 86%, 90% 22%, 83% 22%, 80% 100%, 75% 22%, 66% 22%, 62% 88%, 56% 22%, 46% 22%, 42% 100%, 36% 22%, 27% 22%, 23% 82%, 18% 22%, 10% 22%, 6% 92%, 3% 22%, 0 22%);
      filter: drop-shadow(0 10px 6px rgba(65, 0, 0, 0.45));
      opacity: 0.96;
    }

    .replay-btn {
      color: white;
      background: linear-gradient(135deg, #ff7a3d, #ff4633);
      box-shadow: 0 18px 36px rgba(255, 90, 54, 0.24);
    }

    @keyframes idle-breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 0.86;
      }
      50% {
        transform: scale(1.03);
        opacity: 1;
      }
    }

    @keyframes shooter-step {
      0% { transform: translateX(0); }
      55% { transform: translateX(36px); }
      100% { transform: translateX(20px); }
    }

    @keyframes aim-arm {
      0% { transform: rotate(-18deg); }
      58% { transform: rotate(-74deg); }
      100% { transform: rotate(-66deg); }
    }

    @keyframes lower-arm {
      0% { transform: rotate(-66deg); }
      100% { transform: rotate(-14deg); }
    }

    @keyframes finish-arm {
      0% { transform: rotate(-14deg); }
      100% { transform: rotate(-72deg); }
    }

    @keyframes muzzle-flash {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(0deg);
      }
      40% {
        opacity: 1;
        transform: scale(1.4) rotate(12deg);
      }
      100% {
        opacity: 0;
        transform: scale(0.2) rotate(30deg);
      }
    }

    @keyframes shot-line {
      0% { width: 0; opacity: 0; }
      20% { opacity: 1; }
      100% { width: 420px; opacity: 0; }
    }

    @keyframes shot-line-close {
      0% { width: 0; opacity: 0; }
      20% { opacity: 1; }
      100% { width: 110px; opacity: 0; }
    }

    @keyframes impact-ring {
      0% { opacity: 0; transform: scale(0.25); }
      35% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.9); }
    }

    @keyframes impact-glow-burst {
      0% { opacity: 0; transform: scale(0.2); }
      35% { opacity: 0.95; }
      100% { opacity: 0.14; transform: scale(1.65); }
    }

    @keyframes fall-down {
      0% { transform: translateY(0) rotate(0deg); }
      20% { transform: translateY(-10px) rotate(10deg); }
      100% { transform: translateY(18px) rotate(82deg); }
    }

    @keyframes stillness {
      0% { filter: brightness(1); }
      100% { filter: brightness(0.82); }
    }

    @keyframes final-hit-react {
      0% { transform: translateY(18px) rotate(82deg); }
      100% { transform: translateY(24px) rotate(88deg); }
    }

    @keyframes mohir-hunch {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(16deg) translateY(18px); }
    }

    @keyframes mohir-head-drop {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(22deg) translateY(14px); }
    }

    @keyframes mohir-arms-drop {
      0% { filter: brightness(1); }
      100% { filter: brightness(0.88); }
    }

    @keyframes approach-target {
      0% { transform: translateX(20px); }
      100% { transform: translateX(284px) scale(1.04); }
    }

    @keyframes final-shot-pose {
      0% { transform: translateX(284px) scale(1.04); }
      100% { transform: translateX(302px) scale(1.07); }
    }

    @keyframes speech-in {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes eyes-on {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes gun-drop {
      0% {
        opacity: 1;
        transform: rotate(-8deg) translate(0, 0);
      }
      100% {
        opacity: 0;
        transform: rotate(76deg) translate(30px, 150px);
      }
    }

    @keyframes end-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes letter-in {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(0.92);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 920px) {
      .character {
        width: 176px;
        height: 314px;
        bottom: 120px;
      }

      .mumin {
        left: 64px;
      }

      .mohir {
        right: 64px;
      }

      .head {
        width: 74px;
        height: 74px;
      }

      .torso {
        top: 80px;
        width: 54px;
        height: 100px;
      }

      .arm {
        top: 94px;
        height: 96px;
      }

      .arm-left {
        left: 42px;
      }

      .arm-right {
        right: 42px;
      }

      .leg {
        top: 166px;
        height: 112px;
      }

      .leg-left {
        left: 64px;
      }

      .leg-right {
        right: 64px;
      }

      .gun {
        top: 122px;
        left: 112px;
      }

      .flash {
        left: 170px;
        top: 108px;
      }

      .shot-line {
        left: 188px;
        top: 124px;
      }

      .impact {
        top: 128px;
      }

      .impact-glow {
        top: 116px;
      }

      .speech {
        max-width: 180px;
        font-size: 16px;
      }

      .speech.mumin-line,
      .speech.mohir-line {
        left: calc(50% - 98px);
        top: 30px;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 760px;
      }

      .choice-box {
        width: calc(100vw - 24px);
        padding: 18px;
        border-radius: 22px;
        gap: 14px;
      }

      .choice-box p {
        font-size: 18px;
      }

      .choice-row {
        min-height: 132px;
        flex-direction: column;
        gap: 12px;
        overflow: visible;
      }

      .choice-btn {
        width: 100%;
        padding: 15px 18px;
        font-size: 14px;
      }

      .mumin {
        left: 24px;
      }

      .mohir {
        right: 24px;
      }

      .character {
        bottom: 152px;
      }

      .shot-line {
        left: 188px;
      }

      @keyframes approach-target {
        0% { transform: translateX(20px); }
        100% { transform: translateX(126px) scale(1.02); }
      }

      @keyframes final-shot-pose {
        0% { transform: translateX(126px) scale(1.02); }
        100% { transform: translateX(140px) scale(1.04); }
      }

      @keyframes shot-line {
        0% { width: 0; opacity: 0; }
        20% { opacity: 1; }
        100% { width: 210px; opacity: 0; }
      }
    }
  </style>
</head>
<body>
  <section class="scene" id="scene">
    <div class="moon"></div>
    <div class="skyline"></div>
    <div class="ground"></div>
    <div class="vignette"></div>

    <div class="start-layer" id="startLayer">
      <div class="start-pill">Tap To Begin</div>
    </div>

    <div class="choice-layer hidden" id="choiceLayer">
      <div class="choice-box">
        <p>Выбирай: смерть или прощение?</p>
        <div class="choice-row">
          <button class="choice-btn safe" id="safeChoice" type="button">Смерть</button>
          <button class="choice-btn doom" id="doomChoice" type="button">Прощение</button>
        </div>
      </div>
    </div>

    <div class="actors">
      <div class="character mumin">
        <div class="label">Мумин</div>
        <div class="head">
          <div class="face"></div>
          <div class="snout"></div>
        </div>
        <div class="torso"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="gun"></div>
        <div class="flash"></div>
        <div class="shot-line"></div>
        <div class="bubble-anchor">
          <div class="speech mumin-line">Прощайся.</div>
        </div>
      </div>

      <div class="character mohir">
        <div class="label">Мохир</div>
        <div class="head">
          <div class="face"></div>
          <div class="x-eyes">
            <div class="x-eye left"></div>
            <div class="x-eye right"></div>
          </div>
          <div class="snout"></div>
        </div>
        <div class="torso"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="impact"></div>
        <div class="impact-glow"></div>
        <div class="bubble-anchor">
          <div class="speech mohir-line">Нет, блин... прости.</div>
        </div>
      </div>
    </div>

    <div class="end-layer hidden" id="endLayer">
      <div class="end-card">
        <h1 class="end-title" id="endTitle">
          <span class="end-letter" style="animation-delay:0s">T</span>
          <span class="end-letter" style="animation-delay:0.18s">h</span>
          <span class="end-letter" style="animation-delay:0.36s">e</span>
          <span class="end-letter end-gap" style="animation-delay:0.54s"></span>
          <span class="end-letter" style="animation-delay:0.72s">E</span>
          <span class="end-letter" style="animation-delay:0.9s">n</span>
          <span class="end-letter" style="animation-delay:1.08s">d</span>
        </h1>
        <button class="replay-btn" id="replayButton" type="button">Повторить</button>
      </div>
    </div>
  </section>

  <script>
    const scene = document.getElementById("scene");
    const startLayer = document.getElementById("startLayer");
    const choiceLayer = document.getElementById("choiceLayer");
    const endLayer = document.getElementById("endLayer");
    const safeChoice = document.getElementById("safeChoice");
    const doomChoice = document.getElementById("doomChoice");
    const replayButton = document.getElementById("replayButton");
    const endTitle = document.getElementById("endTitle");

    let startTimer = null;
    let choiceTimer = null;
    let finishTimer = null;
    let doomClicks = 0;
    let queued = false;

    function clearTimers() {
      if (startTimer) {
        clearTimeout(startTimer);
        startTimer = null;
      }
      if (choiceTimer) {
        clearTimeout(choiceTimer);
        choiceTimer = null;
      }
      if (finishTimer) {
        clearTimeout(finishTimer);
        finishTimer = null;
      }
    }

    function restartLetters() {
      const letters = endTitle.querySelectorAll(".end-letter");
      for (const letter of letters) {
        letter.style.animation = "none";
        void letter.offsetWidth;
        letter.style.animation = "";
      }
    }

    function resetScene() {
      clearTimers();
      queued = false;
      doomClicks = 0;
      scene.classList.remove("play");
      startLayer.classList.remove("hidden");
      choiceLayer.classList.add("hidden");
      endLayer.classList.add("hidden");
      doomChoice.classList.remove("escape");
      doomChoice.style.left = "";
      doomChoice.style.top = "";
      restartLetters();
      void scene.offsetWidth;
    }

    function finishScene() {
      endLayer.classList.remove("hidden");
    }

    function playScene() {
      choiceLayer.classList.add("hidden");
      scene.classList.add("play");
      finishTimer = window.setTimeout(finishScene, 9200);
    }

    function chooseDeath() {
      if (choiceTimer) {
        clearTimeout(choiceTimer);
        choiceTimer = null;
      }
      playScene();
    }

    function showChoice() {
      choiceLayer.classList.remove("hidden");
    }

    function queueStart() {
      if (queued) {
        return;
      }

      resetScene();
      queued = true;
      startLayer.classList.add("hidden");
      startTimer = window.setTimeout(() => {
        queued = false;
        showChoice();
      }, 2000);
    }

    startLayer.addEventListener("click", queueStart);
    replayButton.addEventListener("click", queueStart);
    safeChoice.addEventListener("click", chooseDeath);

    doomChoice.addEventListener("click", () => {
      doomClicks += 1;
      doomChoice.classList.add("escape");

      if (doomClicks === 1) {
        doomChoice.style.left = "72%";
        doomChoice.style.top = "-6px";
        return;
      }

      doomChoice.style.left = "140%";
      doomChoice.style.top = "-140px";
    });

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (!scene.classList.contains("play")) {
          queueStart();
        }
      }

      if (event.key.toLowerCase() === "r") {
        resetScene();
      }
    });
  </script>
</body>
</html>
