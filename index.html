<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drive</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #050505;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); overflow: hidden; color: white;
        }

        /* Быстрый лоадер */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .counter {
            font-size: 6rem; font-weight: 900; font-style: italic;
            color: var(--neon); text-shadow: 0 0 30px var(--neon);
            filter: blur(0px); transition: 0.3s;
        }

        /* Тулбар */
        .toolbar {
            height: 60px; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; padding: 0 30px;
            border-bottom: 1px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            position: relative; z-index: 10;
        }

        #title { 
            font-size: 1rem; flex-grow: 1; color: var(--neon);
            text-transform: uppercase; letter-spacing: 3px; font-weight: bold;
        }

        .btn-neon {
            border: 1px solid var(--neon); color: var(--neon);
            text-decoration: none; padding: 8px 25px;
            border-radius: 2px; font-size: 12px; font-weight: bold;
            transition: 0.2s; background: transparent;
        }

        .btn-neon:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        /* Контент (PDF теперь обычного цвета) */
        .viewer-container {
            height: calc(100vh - 61px); width: 100%;
            opacity: 0; filter: blur(10px); transform: scale(1.1);
            transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .viewer-container.active { opacity: 1; filter: blur(0); transform: scale(1); }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="counter" id="percent">0</div>
    </div>

    <div class="toolbar">
        <div id="title">просмотр 1.pdf</div>
        <a href="1.pdf" download class="btn-neon">СКАЧАТЬ</a>
    </div>

    <div class="viewer-container" id="content">
        <iframe src="1.pdf"></iframe>
    </div>

    <script>
        const percentEl = document.getElementById('percent');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        
        // Почти моментальная загрузка
        let val = 0;
        const fastLoad = setInterval(() => {
            val += Math.floor(Math.random() * 15) + 5;
            if (val >= 100) {
                val = 100;
                clearInterval(fastLoad);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.style.transform = 'scale(1.5)'; // Эффект разлета
                    loader.style.visibility = 'hidden';
                    content.classList.add('active');
                }, 100);
            }
            percentEl.innerText = val;
        }, 30);

        // Пасхалка на пробел
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const title = document.getElementById('title');
                title.innerText = 'said.pedofil';
                title.style.color = '#ff0055';
                document.querySelector('.toolbar').style.borderColor = '#ff0055';
                document.querySelector('.toolbar').style.boxShadow = '0 0 15px rgba(255, 0, 85, 0.5)';
            }
        });
    </script>
</body>
</html>
