<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Preview</title>
    <style>
        :root {
            --neon-color: #00f2ff;
            --bg-dark: #0a0a0a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Consolas', monospace; 
            background: var(--bg-dark); overflow: hidden; color: white;
        }

        /* Экран загрузки */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .counter {
            font-size: 5rem; font-weight: bold;
            text-shadow: 0 0 20px var(--neon-color);
            color: var(--neon-color);
        }

        .loading-bar-container {
            width: 300px; height: 2px; background: #222; margin-top: 20px; position: relative;
        }

        .loading-bar {
            position: absolute; left: 0; top: 0; height: 100%; 
            background: var(--neon-color); width: 0%;
            box-shadow: 0 0 15px var(--neon-color);
            transition: width 0.1s linear;
        }

        /* Неоновый Тулбар */
        .toolbar {
            height: 60px; background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 30px;
            border-bottom: 2px solid var(--neon-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            position: relative; z-index: 10;
        }

        #title { 
            font-size: 1.2rem; flex-grow: 1; color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-neon {
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            text-decoration: none; padding: 8px 20px;
            border-radius: 5px; font-weight: bold;
            transition: 0.3s;
            box-shadow: inset 0 0 5px var(--neon-color);
        }

        .btn-neon:hover {
            background: var(--neon-color); color: black;
            box-shadow: 0 0 20px var(--neon-color);
        }

        /* Контейнер контента */
        .viewer-container {
            height: calc(100vh - 62px); width: 100%;
            opacity: 0; transform: scale(1.05);
            transition: all 1s ease-out;
        }

        .viewer-container.active { opacity: 1; transform: scale(1); }

        iframe { width: 100%; height: 100%; border: none; filter: invert(0.9) hue-rotate(180deg) contrast(1.1); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="counter" id="percent">0%</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="bar"></div>
        </div>
    </div>

    <div class="toolbar">
        <div id="title">просмотр 1.pdf</div>
        <a href="1.pdf" download class="btn-neon">DOWNLOAD</a>
    </div>

    <div class="viewer-container" id="content">
        <iframe src="1.pdf#toolbar=0"></iframe>
    </div>

    <script>
        // Анимация загрузки
        const percentEl = document.getElementById('percent');
        const barEl = document.getElementById('bar');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        let count = 0;

        const interval = setInterval(() => {
            count += Math.floor(Math.random() * 5) + 2;
            if (count >= 99) {
                count = 99;
                clearInterval(interval);
                setTimeout(finishLoading, 200);
            }
            percentEl.innerText = count + '%';
            barEl.style.width = count + '%';
        }, 40);

        function finishLoading() {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            content.classList.add('active');
        }

        // Пасхалка на пробел
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const title = document.getElementById('title');
                title.innerText = 'said.pedofil';
                title.style.color = '#ff0055';
                title.style.textShadow = '0 0 15px #ff0055';
                document.querySelector('.toolbar').style.borderColor = '#ff0055';
            }
        });
    </script>
</body>
</html>
