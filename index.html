<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drive</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        /* КАСТОМНЫЙ СКРОЛЛБАР (ТОЛЬКО ОДИН) */
        ::-webkit-scrollbar { width: 8px; background: #000; }
        ::-webkit-scrollbar-thumb { 
            background: var(--neon); 
            border-radius: 4px; 
            box-shadow: 0 0 8px var(--neon); 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: white;
            overflow: hidden; /* Убираем скролл у всего окна, он будет внутри контейнера */
        }

        /* Быстрый лоадер */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s ease-in-out;
        }

        .counter {
            font-size: 6rem; font-weight: 900;
            color: var(--neon); text-shadow: 0 0 20px var(--neon);
        }

        /* СТЕКЛЯННЫЙ ТУЛБАР */
        .toolbar {
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(15px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 30px;
            border-bottom: 1px solid var(--border-glass);
            position: fixed; top: 0; width: 100%; z-index: 100;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #title { 
            font-size: 0.9rem; flex-grow: 1; color: #aaa;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-neon {
            border: 1px solid var(--neon); color: var(--neon);
            text-decoration: none; padding: 6px 20px;
            border-radius: 4px; font-size: 11px; font-weight: bold;
            transition: 0.2s; background: transparent; cursor: pointer;
        }

        .btn-neon:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        /* Контент (Оптимизация скролла) */
        .viewer-container {
            margin-top: 60px;
            height: calc(100vh - 60px); width: 100%;
            opacity: 0; filter: blur(10px);
            transition: 0.8s ease-out;
            overflow: hidden; /* Исключаем второй скроллбар */
        }

        .viewer-container.active { opacity: 1; filter: blur(0); }

        iframe { width: 100%; height: 100%; border: none; }

        /* УВЕДОМЛЕНИЕ */
        #alert-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 20, 20, 0.95); border: 2px solid #ff0055;
            padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);
            z-index: 10000; display: none; opacity: 0; transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        #alert-box.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #alert-box h3 { color: #ff0055; margin: 0 0 10px; }
    </style>
</head>
<body>

    <div id="loader"><div class="counter" id="percent">0</div></div>

    <div class="toolbar" id="main-toolbar">
        <div id="title">просмотр 1.pdf</div>
        <a href="1.pdf" download class="btn-neon" id="main-btn">СКАЧАТЬ</a>
    </div>

    <div id="alert-box">
        <h3>Внимание!</h3>
        <p>Александра в 10 метрах от вас</p>
        <button class="btn-neon" style="border-color:#ff0055; color:#ff0055;" onclick="closeAlert()">ОК</button>
    </div>

    <div class="viewer-container" id="content">
        <iframe src="1.pdf"></iframe>
    </div>

    <script>
        const percentEl = document.getElementById('percent');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        const alertBox = document.getElementById('alert-box');
        
        // Быстрая загрузка (0.5 сек)
        let val = 0;
        const fastLoad = setInterval(() => {
            val += Math.floor(Math.random() * 25) + 15;
            if (val >= 100) {
                val = 100;
                clearInterval(fastLoad);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    content.classList.add('active');
                    setTimeout(() => alertBox.classList.add('show'), 10000);
                }, 150);
            }
            percentEl.innerText = val;
        }, 40);

        function closeAlert() {
            alertBox.style.opacity = '0';
            setTimeout(() => alertBox.style.display = 'none', 400);
        }

        // Пасхалка на пробел
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const title = document.getElementById('title');
                const toolbar = document.getElementById('main-toolbar');
                
                title.innerText = 'said.pedofil';
                title.style.color = '#ff0055';
                title.style.textShadow = '0 0 10px #ff0055';
                
                toolbar.style.borderBottom = '1px solid #ff0055';
                toolbar.style.boxShadow = '0 0 20px rgba(255, 0, 85, 0.3)';
                
                // Делаем скроллбар синим при красном тексте для контраста
                document.documentElement.style.setProperty('--neon', '#00f2ff');
            }
        });
    </script>
</body>
</html>
