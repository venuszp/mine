<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Drive | 1.pdf</title>
    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff0055;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        /* ИСПРАВЛЕНИЕ СКРОЛЛБАРА (ТОЛЬКО ОДИН СВЕРХУ ВНИЗ) */
        ::-webkit-scrollbar {
            width: 6px;
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: white;
            overflow: hidden; /* Отключаем скролл у body, чтобы не было двойной полосы */
        }

        /* УЛЬТРА-БЫСТРЫЙ ЛОАДЕР */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .counter {
            font-size: 5rem;
            font-weight: 900;
            color: var(--neon);
            text-shadow: 0 0 25px var(--neon);
            font-style: italic;
        }

        /* СТЕКЛЯННЫЙ ТУЛБАР (ОПТИМИЗИРОВАН) */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #title {
            font-size: 0.85rem;
            flex-grow: 1;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-neon {
            border: 1px solid var(--neon);
            color: var(--neon);
            text-decoration: none;
            padding: 7px 18px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .btn-neon:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 15px var(--neon);
        }

        /* КОНТЕЙНЕР ДЛЯ МОБИЛОК И ПК */
        .viewer-container {
            position: absolute;
            top: 60px; /* Сдвиг под тулбар */
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            filter: blur(10px);
            transform: translateY(10px);
            transition: all 0.7s cubic-bezier(0.1, 1, 0.1, 1);
            overflow-y: auto; /* Позволяем скролл только тут */
            -webkit-overflow-scrolling: touch;
        }

        .viewer-container.active {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* УВЕДОМЛЕНИЕ АЛЕКСАНДРА */
        #alert-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--pink);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.3);
            z-index: 10001;
            display: none;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 85%;
            max-width: 320px;
            backdrop-filter: blur(10px);
        }

        #alert-box.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #alert-box h3 {
            color: var(--pink);
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #alert-box p {
            font-size: 0.95rem;
            color: #ccc;
            margin-bottom: 25px;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 480px) {
            #title { font-size: 0.7rem; }
            .counter { font-size: 3.5rem; }
            .toolbar { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="counter" id="percent">0</div>
    </div>

    <div class="toolbar" id="main-toolbar">
        <div id="title">просмотр 1.pdf</div>
        <a href="1.pdf" download class="btn-neon" id="main-btn">СКАЧАТЬ</a>
    </div>

    <div id="alert-box">
        <h3>Внимание!</h3>
        <p>Александра в 10 метрах от вас</p>
        <button class="btn-neon" style="border-color: var(--pink); color: var(--pink); width: 100%; padding: 12px;" onclick="closeAlert()">ОК</button>
    </div>

    <div class="viewer-container" id="content">
        <iframe src="1.pdf"></iframe>
    </div>

    <script>
        const percentEl = document.getElementById('percent');
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        const alertBox = document.getElementById('alert-box');
        
        // Почти моментальная загрузка (имитация)
        let val = 0;
        const fastLoad = setInterval(() => {
            val += Math.floor(Math.random() * 25) + 15;
            if (val >= 100) {
                val = 100;
                clearInterval(fastLoad);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        content.classList.add('active');
                        // Таймер на Александру (10 секунд)
                        setTimeout(() => {
                            alertBox.classList.add('show');
                        }, 10000);
                    }, 400);
                }, 100);
            }
            percentEl.innerText = val;
        }, 40);

        // Функция закрытия уведомления
        function closeAlert() {
            alertBox.style.opacity = '0';
            alertBox.style.transform = 'translate(-50%, -50%) scale(0.8)';
            setTimeout(() => { alertBox.style.display = 'none'; }, 400);
        }

        // Пасхалка на пробел
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const title = document.getElementById('title');
                const toolbar = document.getElementById('main-toolbar');
                
                title.innerText = 'said.pedofil';
                title.style.color = var(--pink);
                title.style.textShadow = '0 0 10px ' + getComputedStyle(document.documentElement).getPropertyValue('--pink');
                
                toolbar.style.borderBottom = '1px solid var(--pink)';
                toolbar.style.boxShadow = '0 0 25px rgba(255, 0, 85, 0.2)';
            }
        });

        // Для мобилок: пасхалка по тапу на заголовок
        document.getElementById('title').addEventListener('click', () => {
            document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}));
        });
    </script>
</body>
</html>
